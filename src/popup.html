<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FitnaFilter - Purified browsing experience">
    <meta name="theme-color" content="#0d0d0f">
    <title>FitnaFilter</title>
    <link rel="stylesheet" href="./css/popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="popup-header">
            <h1>✨ FitnaFilter</h1>
            <div class="subtitle">Purified Browsing Experience</div>
        </div>

        <!-- Quick Links -->
        <div class="section">
            <div class="links-row">
                <a id="options" href="options.html" target="_blank" class="btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                    </svg>
                    <span>Settings</span>
                </a>
                <a id="github" href="https://github.com/azidancorp/FitnaFilter" target="_blank" class="btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                    </svg>
                    <span>GitHub</span>
                </a>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section">
            <div class="section-title">Quick Actions</div>
            <div class="quick-actions">
                <button type="button" id="showImages" class="btn btn-primary">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                    <span>Show Images</span>
                </button>
                <button type="button" id="reloadTab" class="btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    <span>Reload Tab</span>
                </button>
            </div>
        </div>

        <!-- Filter Color -->
        <div class="filter-color-section">
            <span class="filter-color-label">Filter Color</span>
            <div class="color-buttons">
                <button type="button" id="whiteFilter" class="color-button white-filter" title="White Filter"></button>
                <button type="button" id="blackFilter" class="color-button black-filter" title="Black Filter"></button>
                <button type="button" id="greyFilter" class="color-button grey-filter" title="Grey Filter"></button>
            </div>
        </div>

        <!-- Exclusions -->
        <div class="section">
            <div class="section-title">Exclusions</div>
            <div class="toggle-group">
                <label for="excludeDomain" class="toggle-label" id="exclude-domain-label">Exclude Domain</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="excludeDomain">
                    <span class="toggle-slider"></span>
                </div>
            </div>
            <div class="toggle-group">
                <label for="excludeForTab" class="toggle-label">Exclude This Tab</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="excludeForTab">
                    <span class="toggle-slider"></span>
                </div>
            </div>
        </div>

        <!-- Pause Controls -->
        <div class="section">
            <div class="section-title">Pause Filtering</div>
            <div class="toggle-group">
                <label for="pauseChk" class="toggle-label">Pause Globally</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="pauseChk">
                    <span class="toggle-slider"></span>
                </div>
            </div>
            <div class="toggle-group">
                <label for="pauseForTab" class="toggle-label">Pause This Tab</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="pauseForTab">
                    <span class="toggle-slider"></span>
                </div>
            </div>
        </div>

        <!-- Custom URL -->
        <div class="url-section">
            <div class="section-title">Add URL Exception</div>
            <div class="url-input-wrapper">
                <input type="text" id="customUrlInput" class="url-input" placeholder="Enter URL or pattern...">
            </div>
            <div class="url-buttons">
                <button type="button" id="addUrlBtn" class="btn">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    <span>Add URL</span>
                </button>
                <button type="button" id="grabUrlBtn" class="btn btn-primary">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                    </svg>
                    <span>Grab URL</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="popup-footer">
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span class="status-text">Active</span>
            </div>
            <span class="version">v1.1.2</span>
        </div>
    </div>
    <script src="./js/popup.js" type="text/javascript"></script>
</body>
</html>
